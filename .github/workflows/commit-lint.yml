#
# Enforce Conventional Commits on PR titles (we squash-merge, so the PR title
# becomes the merge commit). Per-commit messages are advisory; DCO is the
# only hard gate beyond this.
name: PR title lint

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            build
            ci
            chore
            style
            perf
            revert
          scopes: |
            analyze
            rules
            parser
            render
            cli
            cmd
            config
            share
            npm
            release
            ci
            docs
            deps
            deps-dev
          requireScope: false
          subjectPattern: "^[a-z].+[^.]$"
          subjectPatternError: |
            Subject ("{subject}") must start lowercase and not end with a period.
            Example: feat(analyze): add missing_cpu_limit rule
